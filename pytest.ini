[pytest]
pythonpath = .
testpaths = selenium_tests playwright_tests
addopts = --durations=0 --durations-min=0.1
markers =
    flaky: optional reruns for known-flaky tests (pytest-rerunfailures)

# Parallel Selenium (each xdist worker gets its own session-scoped driver in conftest):
#   python -m pytest selenium_tests/ -n auto -q
# Use --dist loadscope so session fixtures stay on one worker per module when needed.