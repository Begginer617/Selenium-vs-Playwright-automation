version: "3.9"

services:
  # ============================
  # SELENIUM GRID – HUB
  # ============================
  selenium-hub:
    image: selenium/hub:4.18.1
    container_name: selenium-hub
    ports:
      - "4444:4444"   # Grid UI + test endpoint
    networks:
      - testnet

  # ============================
  # SELENIUM GRID – CHROME NODE
  # ============================
  chrome:
    image: selenium/node-chrome:4.18.1
    container_name: chrome
    shm_size: 2gb      # Prevents Chrome "Aw, Snap!" crashes
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
      - START_XVFB=true
      - VNC_NO_PASSWORD=1
    ports:
      - "7900:7900"    # noVNC viewer port
    networks:
      - testnet

  # ============================
  # PLAYWRIGHT (official image)
  # ============================
  playwright:
    image: mcr.microsoft.com/playwright/python:v1.42.0-focal
    container_name: playwright
    working_dir: /tests
    volumes:
      - ../playwright_tests:/tests
    networks:
      - testnet
    command: ["sleep", "infinity"]

  # ============================
  # ALLURE REPORT – GENERATOR
  # ============================
  allure-generator:
    image: frankescobar/allure-docker-service
    container_name: allure-generator
    ports:
      - "5050:5050"
    environment:
      - CHECK_RESULTS_EVERY_SECONDS=15
      - KEEP_HISTORY=1
    volumes:
      - ../reports/allure-results:/app/allure-results
      - ../reports/allure-report:/app/allure-report
    networks:
      - testnet

  # ============================
  # ALLURE REPORT – UI
  # ============================
  allure-ui:
    image: frankescobar/allure-docker-service-ui
    container_name: allure-ui
    ports:
      - "5252:5252"
    environment:
      - ALLURE_DOCKER_PUBLIC_API_URL=http://localhost:5050
    depends_on:
      - allure-generator
    networks:
      - testnet

# ============================
# Shared network
# ============================
networks:
  testnet:
    driver: bridge